<style>

/* -------------------------
BACKGROUND
------------------------- */

.stApp{
    background: linear-gradient(135deg,#070B1A,#111827,#1E1B4B);
    color:white;
}


/* -------------------------
SIDEBAR
------------------------- */

[data-testid="stSidebar"]{
    background: linear-gradient(180deg,#111827,#0F172A,#020617);
    border-right:1px solid #312E81;
}


/* -------------------------
HEADINGS
------------------------- */

h1{
    color:#8B5CF6;
    font-weight:800;
}

h2,h3,h4{
    color:#F8FAFC;
}


/* -------------------------
BUTTONS
------------------------- */

div.stButton > button{
    width:100%;
    background:linear-gradient(90deg,#7C3AED,#2563EB,#06B6D4);
    color:white;
    border:none;
    border-radius:12px;
    font-weight:700;
    transition:0.3s;
    height:48px;
}

div.stButton > button:hover{

    background:linear-gradient(90deg,#9333EA,#3B82F6,#22D3EE);

    transform:scale(1.03);

    box-shadow:0px 0px 20px rgba(99,102,241,.6);

}


/* -------------------------
CHAT
------------------------- */

.stChatMessage{

    border-radius:18px;
    padding:16px;

    background:#1E293B;

    border:1px solid #334155;

    margin-bottom:10px;

}


/* -------------------------
CHAT INPUT
------------------------- */

[data-testid="stChatInput"]{

    border-radius:18px;

    border:2px solid #6366F1;

    background:#0F172A;

}


/* -------------------------
TEXT INPUT
------------------------- */

.stTextInput input{

    background:#111827;

    color:white;

    border-radius:12px;

    border:2px solid #4338CA;

}


/* -------------------------
FILE UPLOADER
------------------------- */

[data-testid="stFileUploader"]{

    background:#111827;

    border:2px dashed #7C3AED;

    border-radius:14px;

    padding:15px;

}


/* -------------------------
SUCCESS
------------------------- */

.stSuccess{

    background:#064E3B;

    color:#A7F3D0;

}


/* -------------------------
INFO
------------------------- */

.stInfo{

    background:#1E3A8A;

    color:#BFDBFE;

}


/* -------------------------
WARNING
------------------------- */

.stWarning{

    background:#78350F;

    color:#FDE68A;

}


/* -------------------------
SPINNER
------------------------- */

.stSpinner{

    color:#8B5CF6;

}


/* -------------------------
SCROLLBAR
------------------------- */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#6366F1;
    border-radius:20px;
}

::-webkit-scrollbar-track{
    background:#111827;
}

</style>